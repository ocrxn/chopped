{% extends "template.html" %}
{% block content %}
  <h1>Profile</h1>
  <h2>Username:  {{ session.get("user") }} </h2>

  <h1>Settings</h1>
  <div class="delete">
    <button type="button" class="delete-btn">Delete Profile</button>
    <h3>WARNING: This action is PERMANENT!</h3>
  </div>
  {% if session.get("user") == 'admin' %}
    <div class="shutdown">
      <h2>⚠️Admin Panel⚠️</h2>
      <form action="{{ url_for('shutdown') }}" method="POST" style="display: inline;">
        <button type="submit" class="shutdown-btn">Shutdown Flask Server</button>
      </form>
    </div>
{% endif %}

{% endblock %}
